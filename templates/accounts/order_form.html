{% extends 'common_code/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/order_page.css' %}">
{% endblock %}

{% block title %}Place Order{% endblock %}

{% block content %}
<section class="max-w-md mx-auto my-10 bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold mb-6 text-center">Order: {{ product.name }}</h2>

  {% if error %}
    <p class="text-red-600 text-center mb-4">{{ error }}</p>
  {% endif %}

  <form method="post" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-gray-700 font-medium mb-1">Full Name:</label>
      <input type="text" name="full_name" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-400">
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Phone:</label>
      <input type="text" name="phone" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-400">
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Address:</label>
      <textarea name="address" rows="3" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:border-blue-400"></textarea>
    </div>

    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
      Confirm Buy
    </button>
  </form>
</section>
{% endblock %}
